{% extends "base.html" %}

{% block title %}Power Meter{% endblock %}

{% block content %}
<section class="instrument-page" id="pm-panel" data-base-path="{{ module_base_path }}">
    <header class="panel-header">
        <h1>Power Meter</h1>
        <p>Simulated measurement panel</p>
    </header>

    <div class="grid-layout">
        <article class="card control-card">
            <h2>Measurement Control</h2>

            <label for="channel">Channel</label>
            <input id="channel" type="number" min="1" step="1" value="1" />

            <label for="noise">Noise (%)</label>
            <input id="noise" type="number" min="0" step="0.1" value="0.5" />

            <div class="button-row">
                <button id="apply-noise" class="btn btn-secondary">Apply Noise</button>
                <button id="measure" class="btn btn-primary">Take Measurement</button>
            </div>

            <label class="checkbox-row">
                <input id="auto-poll" type="checkbox" checked />
                <span>Auto measure every 1.5s</span>
            </label>
        </article>

        <article class="card telemetry-card">
            <h2>Meter Readback</h2>
            <div class="telemetry-grid">
                <div class="telemetry-item">
                    <span class="label">Voltage</span>
                    <span id="status-voltage" class="value">0.000 V</span>
                </div>
                <div class="telemetry-item">
                    <span class="label">Current</span>
                    <span id="status-current" class="value">0.000 A</span>
                </div>
                <div class="telemetry-item">
                    <span class="label">Power</span>
                    <span id="status-power" class="value">0.000 W</span>
                </div>
                <div class="telemetry-item">
                    <span class="label">Source</span>
                    <span id="status-source" class="value">idle</span>
                </div>
            </div>
            <div id="status-line" class="status-line">Ready.</div>
        </article>
    </div>
</section>
{% endblock %}

{% block scripts_extra %}
<script>
(function () {
    const panel = document.getElementById('pm-panel');
    if (!panel) {
        return;
    }

    const basePath = panel.dataset.basePath || '';
    const apiActionPath = `${basePath}/api/action`;
    const apiRequestPath = `${basePath}/api/request`;

    const channelInput = document.getElementById('channel');
    const noiseInput = document.getElementById('noise');
    const applyNoiseBtn = document.getElementById('apply-noise');
    const measureBtn = document.getElementById('measure');
    const autoPoll = document.getElementById('auto-poll');
    const statusLine = document.getElementById('status-line');

    async function callAction(action, argumentsPayload) {
        const response = await fetch(apiActionPath, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, arguments: argumentsPayload }),
        });
        const result = await response.json();
        if (!result.ok) {
            throw new Error(result.error || 'Action failed');
        }
    }

    async function callRequest(action, argumentsPayload, timeoutMs = 1200) {
        const response = await fetch(apiRequestPath, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, arguments: argumentsPayload, timeout_ms: timeoutMs }),
        });
        const result = await response.json();
        if (!result.ok) {
            throw new Error(result.error || 'Request failed');
        }
        return result.response || {};
    }

    function setStatus(message, isError = false) {
        statusLine.textContent = message;
        statusLine.classList.toggle('error', isError);
    }

    function updateTelemetry(reading) {
        document.getElementById('status-voltage').textContent = `${Number(reading.voltage || 0).toFixed(3)} V`;
        document.getElementById('status-current').textContent = `${Number(reading.current || 0).toFixed(3)} A`;
        document.getElementById('status-power').textContent = `${Number(reading.power || 0).toFixed(3)} W`;
        document.getElementById('status-source').textContent = String(reading.source || 'power_supply');
    }

    async function readStatus() {
        try {
            const status = await callRequest('read_status', {});
            noiseInput.value = Number(status.noise_percent || 0).toFixed(3);
            if (status.last_measurement) {
                updateTelemetry(status.last_measurement);
            }
        } catch (error) {
            setStatus(error.message, true);
        }
    }

    async function takeMeasurement() {
        try {
            const channel = Number(channelInput.value);
            const reading = await callRequest('measure', { channel });
            updateTelemetry(reading);
            setStatus(`Measured channel ${channel}.`);
        } catch (error) {
            setStatus(error.message, true);
        }
    }

    applyNoiseBtn.addEventListener('click', async function () {
        try {
            await callAction('set_noise', { noise_percent: Number(noiseInput.value) });
            await readStatus();
            setStatus('Noise setting updated.');
        } catch (error) {
            setStatus(error.message, true);
        }
    });

    measureBtn.addEventListener('click', takeMeasurement);

    setInterval(function () {
        if (autoPoll.checked) {
            takeMeasurement();
        }
    }, 1500);

    readStatus();
})();
</script>
{% endblock %}
